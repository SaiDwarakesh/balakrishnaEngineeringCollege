<header class="w-full transition-all duration-300"
  [ngClass]="isSticky ? 'bg-white/90 backdrop-blur-md shadow-lg' : 'bg-dark'">

  <!-- Top Bar -->
  <div class="container mx-auto px-4 lg:px-6 overflow-hidden transition-all duration-300" [class.max-h-0]="isSticky"
    [class.opacity-0]="isSticky" [class.max-h-20]="!isSticky">
    <div
      class="flex items-center justify-between text-white text-[13px] py-1.5 border-b border-white/10 hidden lg:flex">
      <!-- Contact Info -->
      <div class="flex items-center gap-6">
        <a href="mailto:info&#64;balakrishnaengg.com"
          class="flex items-center gap-2 hover:text-danger transition-colors">
          <i class="fa fa-envelope-o"></i>
          <span>info&#64;balakrishnaengg.com</span>
        </a>
        <a href="tel:+919848246222" class="flex items-center gap-2 hover:text-danger transition-colors">
          <i class="fa fa-phone"></i>
          <span>+91 98482 46222</span>
        </a>
      </div>
      <!-- Top Nav Links -->
      <div class="flex items-center gap-5 font-medium opacity-90">
        <a routerLink="/admissions" class="hover:text-danger transition-colors cursor-pointer">Apply Now</a>
        <a routerLink="/contact" class="hover:text-danger transition-colors cursor-pointer">Contact Us</a>
      </div>
    </div>
  </div>

  <!-- Main Navigation Bar -->
  <div class="container mx-auto px-4 lg:-mb-10 lg:mt-3 relative">
    <nav class="bg-white rounded-xl lg:rounded-2xl shadow-xl flex items-center justify-between py-2 px-4 lg:px-6">

      <!-- Mobile Menu Button -->
      <button (click)="toggleMenu()" class="lg:hidden text-dark p-2 focus:outline-none order-1">
        <i class="fa" [ngClass]="isMenuOpen ? 'fa-times text-xl' : 'fa-bars text-xl'"></i>
      </button>

      <!-- Logo & Name -->
      <div
        class="flex items-center gap-2 lg:gap-4 order-2 lg:order-1 flex-1 lg:flex-none justify-center lg:justify-start">
        <div
          class="w-12 h-12 lg:w-20 lg:h-20 flex items-center justify-center p-0.5 lg:p-1 bg-white border border-gray-100 rounded-full cursor-pointer"
          routerLink="/">
          <img src="assets/college-logo.png" alt="Balakrishna Logo" class="w-full h-full object-contain">
        </div>
        <div class="flex flex-col cursor-pointer" routerLink="/">
          <h1
            class="text-danger font-extrabold text-sm sm:text-lg lg:text-2xl tracking-tight leading-none lg:leading-tight uppercase font-[Inter]">
            Balakrishna
          </h1>
          <h2
            class="text-dark font-bold text-xs sm:text-base lg:text-xl tracking-wide leading-none lg:leading-tight uppercase font-[Inter]">
            Engineering College
          </h2>
          <span class="text-[8px] lg:text-[10px] text-gray-500 font-medium tracking-wider hidden sm:block">AFFILIATED TO
            JNTUK | ACCREDITED BY NAAC</span>
        </div>
      </div>

      <!-- Navigation Links -->
      <div class="hidden 2lg:flex items-center gap-7 order-2">
        <a routerLink="/" routerLinkActive="text-orange border-b-2 border-orange"
          [routerLinkActiveOptions]="{exact: true}"
          class="text-dark font-bold text-[15px] hover:text-orange transition-all py-1">Home</a>
        <a routerLink="/about" routerLinkActive="text-orange border-b-2 border-orange"
          class="text-dark font-bold text-[15px] hover:text-orange transition-all py-1">About</a>
        <a routerLink="/colleges" routerLinkActive="text-orange border-b-2 border-orange"
          class="text-dark font-bold text-[15px] hover:text-orange transition-all py-1">Colleges</a>
        <a routerLink="/academics" routerLinkActive="text-orange border-b-2 border-orange"
          class="text-dark font-bold text-[15px] hover:text-orange transition-all py-1">Academics</a>
        <a routerLink="/admissions" routerLinkActive="text-orange border-b-2 border-orange"
          class="text-dark font-bold text-[15px] hover:text-orange transition-all py-1">Admissions</a>
        <a routerLink="/placements" routerLinkActive="text-orange border-b-2 border-orange"
          class="text-dark font-bold text-[15px] hover:text-orange transition-all py-1">Placements</a>
      </div>

      <!-- Apply Now CTA -->
      <div class="flex items-center order-3">
        <button routerLink="/admissions"
          class="bg-danger hover:bg-danger-active text-white px-3 lg:px-7 py-2 lg:py-3.5 rounded-lg lg:rounded-xl font-bold text-xs lg:text-[15px] shadow-lg shadow-danger-clarity flex items-center gap-1 lg:gap-2 group transition-all">
          <i class="fa fa-pencil group-hover:rotate-12 transition-transform"></i>
          <span class="hidden sm:inline">APPLY NOW</span>
          <span class="sm:hidden text-[10px]">APPLY</span>
        </button>
      </div>
    </nav>

    <!-- Mobile Navigation Drawer -->
    <div
      class="lg:hidden absolute left-0 right-0 top-full mt-2 mx-4 bg-white rounded-xl shadow-2xl overflow-hidden transition-all duration-300 z-40 border border-gray-100"
      [class.max-h-0]="!isMenuOpen" [class.max-h-[500px]]="isMenuOpen" [class.opacity-0]="!isMenuOpen">
      <div class="flex flex-col px-6 divide-y divide-gray-100 py-4">
        <a routerLink="/" (click)="isMenuOpen = false" routerLinkActive="text-orange"
          [routerLinkActiveOptions]="{exact: true}"
          class="py-3 text-dark font-bold text-[15px] hover:text-orange transition-colors">Home</a>
        <a routerLink="/about" (click)="isMenuOpen = false" routerLinkActive="text-orange"
          class="py-3 text-dark font-bold text-[15px] hover:text-orange transition-colors">About</a>
        <a routerLink="/colleges" (click)="isMenuOpen = false" routerLinkActive="text-orange"
          class="py-3 text-dark font-bold text-[15px] hover:text-orange transition-colors">Colleges</a>
        <a routerLink="/academics" (click)="isMenuOpen = false" routerLinkActive="text-orange"
          class="py-3 text-dark font-bold text-[15px] hover:text-orange transition-colors">Academics</a>
        <a routerLink="/admissions" (click)="isMenuOpen = false" routerLinkActive="text-orange"
          class="py-3 text-dark font-bold text-[15px] hover:text-danger transition-colors">Admissions</a>
        <a routerLink="/placements" (click)="isMenuOpen = false" routerLinkActive="text-orange"
          class="py-3 text-dark font-bold text-[15px] hover:text-danger transition-colors">Placements</a>
      </div>
    </div>
  </div>
</header>
<div class="h-10 lg:h-16 bg-dark/5 lg:block hidden"></div>
