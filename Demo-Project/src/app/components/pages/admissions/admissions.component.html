<!-- Hero Banner -->
<section class="relative h-[40vh] min-h-[300px] flex items-center justify-center overflow-hidden">
  <img src="assets/banners/banner-1.png" class="absolute inset-0 w-full h-full object-cover brightness-[0.3]"
    alt="Admissions">
  <div class="relative z-10 text-center space-y-4 animate-fade-in">
    <h1 class="text-white font-black text-5xl lg:text-7xl uppercase tracking-widest drop-shadow-2xl">Admissions
    </h1>

  </div>
</section>

<!-- Content Section -->
<section class="py-20 bg-gray-50">
  <div class="container mx-auto px-4 max-w-4xl space-y-16">

    <!-- Title & Description -->
    <div class="text-center space-y-4 max-w-3xl mx-auto">
      <h2 class="text-dark font-black text-4xl lg:text-5xl uppercase tracking-tight">Admission Procedure</h2>
      <div class="w-24 h-1.5 bg-danger mx-auto rounded-full"></div>
      <p class="text-gray-500 font-medium">Step-by-step guide to join Balakrishna Engineering College</p>
    </div>

    <!-- Admission Process Card -->
    <div class="bg-white rounded-[2rem] shadow-2xl p-8 lg:p-12 border border-gray-100 animate-fade-in-up">
      <div class="flex items-center gap-4 mb-10 border-b border-gray-100 pb-6">
        <div class="w-12 h-12 bg-danger/10 rounded-xl flex items-center justify-center">
          <i class="fa fa-graduation-cap text-2xl text-danger"></i>
        </div>
        <h3 class="text-2xl font-black text-dark uppercase tracking-tight">Admission Process</h3>
      </div>

      <div class="space-y-8 relative">
        <!-- Vertical Line Behind Steps -->
        <div class="absolute left-[23px] top-6 bottom-6 w-0.5 bg-gray-100 hidden sm:block"></div>

        @for (step of admissionSteps; track $index) {
        <div class="flex flex-col sm:flex-row gap-6 group relative z-10 transition-all duration-300">
          <div class="shrink-0">
            <div
              class="w-12 h-12 rounded-full bg-white border-2 border-danger flex items-center justify-center text-danger font-black text-xl shadow-lg shadow-danger/10 group-hover:bg-danger group-hover:text-white transition-all">
              {{ step.id }}
            </div>
          </div>
          <div class="space-y-2">
            <h4 class="text-dark font-black text-xl uppercase tracking-tight group-hover:text-danger transition-colors">
              {{ step.title }}</h4>
            <p class="text-gray-500 text-sm leading-relaxed">{{ step.desc }}</p>
          </div>
        </div>
        }
      </div>
    </div>

    <!-- Required Documents Card -->
    <div class="bg-white rounded-[2rem] shadow-2xl p-8 lg:p-12 border border-gray-100 animate-fade-in-up delay-300">
      <div class="flex items-center gap-4 mb-10 border-b border-gray-100 pb-6">
        <div class="w-12 h-12 bg-danger/10 rounded-xl flex items-center justify-center">
          <i class="fa fa-file-text text-2xl text-danger"></i>
        </div>
        <h3 class="text-2xl font-black text-dark uppercase tracking-tight">Required Documents</h3>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-4">
        @for (doc of requiredDocuments; track $index) {
        <div class="flex items-start gap-4 group">
          <div class="mt-1 transition-transform group-hover:scale-125">
            <i class="fa fa-check text-danger text-sm"></i>
          </div>
          <p
            class="text-gray-500 font-bold text-sm lg:text-base border-b border-dashed border-gray-100 pb-2 w-full group-hover:text-dark transition-colors">
            {{ doc }}</p>
        </div>
        }
      </div>
    </div>

    <!-- CTA Section -->
    <div class="text-center animate-fade-in-up delay-500">
      <button routerLink="/contact"
        class="px-12 py-5 bg-dark text-white rounded-2xl font-black uppercase text-sm tracking-widest hover:bg-danger shadow-2xl transition-all transform hover:-translate-y-1">
        Need Help? Contact Us
      </button>
    </div>
  </div>
</section>
