<!-- Hero Banner -->
<section class="relative h-[40vh] min-h-[300px] flex items-center justify-center overflow-hidden">
  <img src="assets/banners/banner-1.png" class="absolute inset-0 w-full h-full object-cover brightness-[0.3]"
    alt="Contact">
  <div class="relative z-10 text-center space-y-4 animate-fade-in">
    <h1 class="text-white font-black text-5xl lg:text-7xl uppercase tracking-widest drop-shadow-2xl">Contact Us</h1>
    <nav class="flex justify-center gap-3 text-white/80 font-bold uppercase tracking-widest text-sm">
    </nav>
  </div>
</section>

<!-- Contact Cards Section -->
<section class="py-20 bg-gray-50 overflow-hidden">
  <div class="container mx-auto px-4 max-w-6xl">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 animate-fade-in-up">
      @for (info of contactInfo; track $index) {
      <div
        class="bg-white p-8 rounded-[2rem] shadow-xl text-center space-y-4 border border-gray-100 hover:transform hover:-translate-y-2 transition-all group relative overflow-hidden">
        <div
          class="absolute inset-x-0 bottom-0 h-1.5 bg-danger scale-x-0 group-hover:scale-x-100 transition-transform origin-left">
        </div>
        <div
          class="w-16 h-16 mx-auto bg-dark/5 rounded-full flex items-center justify-center group-hover:bg-danger transition-colors transform group-hover:rotate-[360deg] duration-700">
          <i class="fa {{ info.icon }} text-2xl text-danger group-hover:text-white"></i>
        </div>
        <h4 class="text-dark font-black text-lg uppercase tracking-wider">{{ info.title }}</h4>
        <div class="text-gray-500 text-sm font-medium">
          <p>{{ info.detail1 }}</p>
          <p *ngIf="info.detail2">{{ info.detail2 }}</p>
        </div>
      </div>
      }
    </div>

    <!-- Message Form Section -->
    <div class="mt-20 bg-white rounded-[3rem] shadow-2xl overflow-hidden animate-fade-in-up delay-300">
      <div class="grid grid-cols-1 lg:grid-cols-5 h-full min-h-[500px]">
        <!-- Image Side -->
        <div class="lg:col-span-2 relative hidden lg:block overflow-hidden">
          <img src="assets/banners/banner-1.png"
            class="absolute inset-0 w-full h-full object-cover brightness-[0.6] hover:scale-110 transition-transform duration-1000"
            alt="Student">
          <!-- Glass Overlay for Image info -->
          <div
            class="absolute inset-0 z-10 flex flex-col justify-end p-12 text-white bg-gradient-to-t from-dark/80 to-transparent">
            <h3 class="text-3xl font-black uppercase tracking-tight mb-2">Join Us Now</h3>
            <p class="text-white/70 font-bold text-sm uppercase tracking-widest">Shaping the future of technical
              education in Andhra Pradesh.</p>
          </div>
        </div>

        <!-- Form Side -->
        <div class="lg:col-span-3 p-8 lg:p-16 space-y-8">
          <div class="space-y-2">
            <h3 class="text-danger font-bold text-lg uppercase tracking-[0.3em]">Send Message</h3>
            <h2 class="text-dark font-black text-3xl lg:text-4xl uppercase tracking-tight">How Can We Help?</h2>
          </div>

          <form (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <input type="text" name="name" [(ngModel)]="formData.name" placeholder="Your Name" required
                class="w-full px-6 py-4 bg-gray-50 border border-transparent rounded-2xl focus:border-danger focus:bg-white outline-none transition-all font-bold">
            </div>
            <div class="space-y-2">
              <input type="email" name="email" [(ngModel)]="formData.email" placeholder="Your Email" required
                class="w-full px-6 py-4 bg-gray-50 border border-transparent rounded-2xl focus:border-danger focus:bg-white outline-none transition-all font-bold">
            </div>
            <div class="md:col-span-2 space-y-2">
              <input type="text" name="subject" [(ngModel)]="formData.subject" placeholder="Subject" required
                class="w-full px-6 py-4 bg-gray-50 border border-transparent rounded-2xl focus:border-danger focus:bg-white outline-none transition-all font-bold">
            </div>
            <div class="md:col-span-2 space-y-2">
              <textarea name="message" [(ngModel)]="formData.message" rows="4" placeholder="Your Message" required
                class="w-full px-6 py-4 bg-gray-50 border border-transparent rounded-2xl focus:border-danger focus:bg-white outline-none transition-all font-bold resize-none"></textarea>
            </div>
            <div class="md:col-span-2">
              <button type="submit"
                class="w-full lg:w-auto px-10 py-5 bg-danger text-white rounded-2xl font-black uppercase text-sm tracking-widest hover:scale-105 shadow-xl shadow-danger/20 transition-all flex items-center justify-center gap-3">
                Send Message <i class="fa fa-paper-plane"></i>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
