name: Build and Deploy

on:
  push:
    branches:
      - Basic-Demo-01

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare for GitHub Pages (404.html)
        run: cp dist/demo-projects/browser/index.html dist/demo-projects/browser/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/demo-projects/browser
          branch: gh-pages
